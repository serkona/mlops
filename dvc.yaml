stages:
  prepare_data:
    cmd: >-
      python mlops/dataset.py
      --test-size ${prepare_data.test_size}
      --random-state ${prepare_data.random_state}
    deps:
    - data/raw/dataset
    - mlops/dataset.py
    params:
    - prepare_data.test_size
    - prepare_data.random_state
    outs:
    - data/processed/train.csv
    - data/processed/test.csv

  featurize:
    cmd: python mlops/features.py
    deps:
    - data/processed/train.csv
    - data/processed/test.csv
    - mlops/features.py
    outs:
    - data/processed/train_featured.csv
    - data/processed/test_featured.csv
    - models/scaler.pkl

  train:
    cmd: >-
      python mlops/modeling/train.py
      --n-estimators ${train.n_estimators}
      --random-state ${train.random_state}
    deps:
    - data/processed/train_featured.csv
    - data/processed/test_featured.csv
    - mlops/modeling/train.py
    params:
    - train.n_estimators
    - train.random_state
    outs:
    - models/model.pkl
