name: mlops-api
channels:
  - conda-forge
dependencies:
  - python>=3.11,<3.13
  - pip

  # API server
  - fastapi=0.135.3
  - uvicorn=0.30.6
  - starlette>=0.49.1

  # ML inference
  - scikit-learn=1.5.1
  - pandas=2.2.2
  - numpy=1.26.4
  - joblib=1.4.2

  # Utilities
  - typer>=0.15.1
  - loguru=0.7.2
  - protobuf>=4.25.8

  - pip:
    - python-dotenv==1.0.1
    - -e .
