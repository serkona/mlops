name: mlops
channels:
  - conda-forge
dependencies:
  # Core — range allows CI matrix strategy (3.11 / 3.12)
  - python>=3.11,<3.13
  - pip

  # Jupyter Environment
  - ipython=8.26.0
  - jupyterlab=4.2.4
  - notebook=7.2.1

  # Data Science & ML
  - numpy=1.26.4
  - pandas=2.2.2
  - scikit-learn=1.5.1
  - matplotlib=3.9.2
  - seaborn=0.13.2
  - joblib=1.4.2
  - fastapi=0.135.3
  - uvicorn=0.30.6

  # MLOps
  - mlflow=2.16.0

  # Tools & Utilities
  - typer=0.12.3
  - loguru=0.7.2
  - tqdm=4.66.4

  # Dev Tools
  - ruff=0.5.5
  - pytest>=9.0.3
  - pytest-cov=5.0.0
  - httpx=0.27.0
  - pillow>=12.2.0    # CVE-2026-40192
  - starlette>=0.40.0 # CVE-2024-47874 (fastapi 0.115 compatible)
  - protobuf>=4.25.8  # CVE-2025-4565

  - pip:
    # AWS / S3 stack (pinned for compatibility)
    - awscli==1.33.0
    - botocore==1.34.118
    - aiobotocore==2.13.1
    - s3fs==2024.6.0
    
    # DVC
    - dvc==3.53.1
    - dvc-s3
    
    # Other
    - python-dotenv==1.0.1
    - mkdocs==1.6.0
    - liac-arff==2.5.0
    - pathspec<1.0.0
    - -e .
